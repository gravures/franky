[run]
branch = true
relative_files = true
source = ["src"]
omit = ["*/__main__.py", "*/_version.py"]

[report]
fail_under = 0
show_missing = true
skip_covered = true
partial_also = [
  # our platform pragmas
  "\\# pragma: (nt|posix|cygwin|darwin|linux|msys|win32|cpython|pypy) (no )?cover\\b",
  # our version pragmas
  "\\# pragma: (>=?|<=?|==|!=)\\d+\\.\\d+ cover\\b",
]
exclude_also = [
  # allow defensive code
  "^\\s*raise AssertionError\\b",
  "^\\s*raise NotImplementedError\\b",
  "^\\s*return NotImplemented\\b",
  "^\\s*raise$",
  # typing-related code
  "^\\s*if (False|TYPE_CHECKING):",
  ": \\.\\.\\.(\\s*#.*)?$",
  "^ +\\.\\.\\.$",
  "-> ['\"]?NoReturn['\"]?:",
  # typeVar
  "^.*\\s=\\sTypeVar\\(.*\\)$",
  #
  "^\\s*__slots__.*$",
  # non-runnable code
  "if __name__ == ['\"]__main__['\"]:$",
  # overload method
  "^@overload",
]
